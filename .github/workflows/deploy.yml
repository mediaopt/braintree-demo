name: Deploy Storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build Storybook
        run: npm run build-storybook
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_CTP_PROJECT_KEY: ${{ secrets.VITE_CTP_PROJECT_KEY }}
          VITE_CTP_REGION: ${{ secrets.VITE_CTP_REGION }}
          VITE_CTP_APPLICATION_KEY: ${{ secrets.VITE_CTP_APPLICATION_KEY }}
          VITE_CTP_CLIENT_ID: ${{ secrets.VITE_CTP_CLIENT_ID }}
          VITE_CTP_CLIENT_SECRET: ${{ secrets.VITE_CTP_CLIENT_SECRET }}
          VITE_CTP_SCOPE: ${{ secrets.VITE_CTP_SCOPE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
      - uses: actions/deploy-pages@v4
        id: deployment
